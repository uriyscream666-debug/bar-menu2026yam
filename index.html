<!DOCTYPE html>

<head>
  <meta charset="UTF-8">

  <link rel="preconnect" href="https://fonts.googleapis.com">

  <style>
    :root {
      --gold: #D4AF37;
      --gold-light: #F2E2A4;
      --gold-dark: #AA8C2C;
      --bg-deep: #0F0C08;
      --bg-card: #1A150E;
      --text-main: #E8E6E1;
      --text-muted: #A09B91;
      --border: 1px solid rgba(212,175,55,0.3);
    }
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      font-family: 'Montserrat', sans-serif;
      background-color: var(--bg-deep);
      color: var(--text-main);
      background-image: radial-gradient(circle at 20% 30%, rgba(212,175,55,0.03) 0%, transparent 40%);
      min-height: 100vh;
    }
    body::before {
      content: '';
      position: fixed; top: 0; left: 0; right: 0; bottom: 0;
      border: 3px double var(--gold);
      pointer-events: none; z-index: 9999;
      margin: 8px; opacity: 0.6;
    }
    h1,h2,h3,h4 { font-family: 'Cormorant Garamond', serif; }
    
    .hero {
      min-height: 100vh;
      display: flex; flex-direction: column; justify-content: center; align-items: center; text-align: center;
      padding: 2rem;
    }
    .hero-ornament { font-size: 2.5rem; color: var(--gold); margin-bottom: 1rem; }
    .hero h1 { font-size: clamp(2rem, 5vw, 3.5rem); color: var(--gold); text-transform: uppercase; letter-spacing: 3px; margin-bottom: 0.5rem; }
    .hero p { font-size: 1.1rem; color: var(--text-muted); margin-bottom: 2.5rem; font-style: italic; }
    .btn-gold {
      background: linear-gradient(45deg, var(--gold-dark), var(--gold));
      color: #000; font-family: 'Cormorant Garamond', serif; font-size: 1.3rem; font-weight: 700;
      padding: 0.9rem 2.5rem; border: 2px solid var(--gold-light); border-radius: 50px;
      cursor: pointer; transition: all 0.3s; text-transform: uppercase; letter-spacing: 2px;
    }
    .btn-gold:hover { transform: scale(1.05); background: var(--gold-light); }

    #app { display: none; max-width: 1200px; margin: 0 auto; padding: 1rem 1rem 4rem; }

    .nav-scroller {
      position: sticky; top: 10px; z-index: 100; margin-bottom: 1.5rem;
      background: rgba(15,12,8,0.95); backdrop-filter: blur(8px);
      padding: 0.5rem; border-radius: 50px; border: 1px solid rgba(212,175,55,0.4);
      display: flex; overflow-x: auto; gap: 0.4rem; scrollbar-width: none;
    }
    .nav-scroller::-webkit-scrollbar { display: none; }
    .nav-btn {
      background: transparent; border: 1px solid transparent; color: var(--text-muted);
      padding: 0.5rem 1rem; border-radius: 40px; font-family: 'Cormorant Garamond', serif;
      font-size: 1rem; font-weight: 600; cursor: pointer; white-space: nowrap; transition: 0.2s;
    }
    .nav-btn.active { background: var(--gold); color: #000; border-color: var(--gold-light); }

    .section { display: none; }
    .section.active { display: block; animation: fadeIn 0.5s ease; }
    @keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }
    
    .section-header { text-align: center; margin-bottom: 1.5rem; padding-bottom: 0.8rem; border-bottom: 1px solid rgba(212,175,55,0.3); }
    .section-header h2 { font-size: 2rem; color: var(--gold); }

    .grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(280px, 1fr)); gap: 1.2rem; }
    .card {
      background: var(--bg-card); border: 1px solid rgba(212,175,55,0.2); border-radius: 10px;
      padding: 1.2rem; position: relative; transition: transform 0.2s; cursor: pointer;
    }
    .card:hover { transform: translateY(-4px); border-color: var(--gold); }
    .card-title { font-size: 1.3rem; color: var(--gold); margin-bottom: 0.4rem; }
    .card-sub { font-size: 0.85rem; color: var(--text-muted); margin-bottom: 0.8rem; font-style: italic; }
    .card-tags { display: flex; flex-wrap: wrap; gap: 0.4rem; margin-bottom: 0.6rem; }
    .tag { background: rgba(212,175,55,0.1); color: var(--gold); padding: 0.15rem 0.5rem; border-radius: 4px; font-size: 0.7rem; }
    .price { position: absolute; bottom: 1rem; right: 1rem; font-size: 1.1rem; font-weight: 700; color: var(--gold); }

    .search-box {
      width: 100%; padding: 0.8rem 1.2rem; background: var(--bg-card); border: 1px solid rgba(212,175,55,0.3);
      border-radius: 50px; color: var(--text-main); font-size: 1rem; margin-bottom: 1.5rem;
    }
    .info-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(300px, 1fr)); gap: 1.2rem; }
    .info-card { background: var(--bg-card); border: 1px solid rgba(212,175,55,0.2); border-radius: 10px; padding: 1.2rem; }
    .info-card h3 { color: var(--gold); margin-bottom: 0.5rem; }
    .info-card p { color: var(--text-muted); line-height: 1.5; font-size: 0.9rem; }

    .modal-back { position: fixed; top: 0; left: 0; right: 0; bottom: 0; background: rgba(0,0,0,0.9); z-index: 2000; display: none; justify-content: center; align-items: center; padding: 1rem; }
    .modal-back.open { display: flex; }
    .modal-box { background: var(--bg-card); border: 2px solid var(--gold); border-radius: 12px; padding: 1.5rem; max-width: 600px; width: 100%; max-height: 90vh; overflow-y: auto; position: relative; }
    .modal-close { position: absolute; top: 10px; right: 12px; font-size: 1.8rem; color: var(--gold); cursor: pointer; background: none; border: none; }
    .modal-title { font-size: 1.6rem; color: var(--gold); margin-bottom: 0.5rem; }
    .modal-ing { display: flex; flex-wrap: wrap; gap: 0.5rem; margin: 0.8rem 0; }
    .modal-ing span { background: rgba(212,175,55,0.1); color: var(--gold); padding: 0.3rem 0.6rem; border-radius: 20px; font-size: 0.8rem; }
    .brand-link { display: inline-flex; margin-top: 1rem; padding: 0.5rem 1rem; background: rgba(212,175,55,0.1); border: 1px solid var(--gold); border-radius: 8px; color: var(--gold); text-decoration: none; }

    @media (max-width: 600px) {
      .hero h1 { font-size: 2rem; }
      .grid { grid-template-columns: 1fr; }
    }
  </style>
</head>

let current = 'water';

function init() {
  document.getElementById('startBtn').onclick = () => {
    document.getElementById('hero').style.display = 'none';
    document.getElementById('app').style.display = 'block';
    render();
  };
  document.getElementById('closeModal').onclick = closeModal;
  document.getElementById('modal').onclick = e => { if(e.target.id==='modal') closeModal(); };
}

function render() {
  const nav = document.getElementById('nav');
  nav.innerHTML = navItems.map(n => 
    `<button class="nav-btn ${n.id===current?'active':''}" onclick="switchTab('${n.id}')">${n.t}</button>`
  ).join('');
  
  const content = document.getElementById('content');
  content.innerHTML = '';
  
  if(current === 'search') {
    content.innerHTML = `<div class="section active"><div class="section-header"><h2>🔍 Поиск</h2></div>
      <input class="search-box" placeholder="Введите: джин, ром, манго..." oninput="doSearch(this.value)">
      <div id="searchRes"></div></div>`;
  } else if(current === 'info') {
    content.innerHTML = `<div class="section active"><div class="section-header"><h2>${menu.info.title}</h2></div>
      <div class="info-grid">${menu.info.items.map(i => `<div class="info-card"><h3>${i.n}</h3><p>${i.d}</p></div>`).join('')}</div></div>`;
  } else if(current === 'allerg') {
    content.innerHTML = `<div class="section active"><div class="section-header"><h2>${menu.allerg.title}</h2></div>
      ${menu.allerg.table.map(r => `<div class="card" style="margin-bottom:0.5rem"><strong style="color:var(--gold)">${r.n}</strong><br><span style="color:var(--text-muted)">${r.l}</span></div>`).join('')}</div>`;
  } else if(current === 'quiz') {
    content.innerHTML = `<div class="section active"><div class="section-header"><h2>${menu.quiz.title}</h2></div>
      ${menu.quiz.q.map((q,i) => `<div class="card" style="margin-bottom:1rem"><h4>${i+1}. ${q.q}</h4>
      ${q.o.map((opt,j) => `<button class="nav-btn" style="display:block;width:100%;margin:0.3rem 0;text-align:left" onclick="checkQ(this,${j===q.c})">${opt}</button>`).join('')}</div>`).join('')}</div>`;
  } else {
    const data = menu[current];

    content.innerHTML = `<div class="section active"><div class="section-header"><h2>${data.title}</h2></div>
      <div class="grid">${data.items.map(it => `
        <div class="card" onclick="openModal('${it.n}','${it.d||''}','${it.p}','${it.v||'50 мл'}','${it.i.join(', ')}','${it.a?it.a.join(','):''}','${it.br||''}')">
          <h3 class="card-title">${it.n}</h3>
          <p class="card-sub">${it.d||''}</p>
          <div class="card-tags">${it.i.slice(0,3).map(x=>`<span class="tag">${x}</span>`).join('')}</div>
          <div class="price">${it.p} ₽</div>
        </div>`).join('')}</div></div>`;
  }
}

function switchTab(id) {
  current = id;
  render();
}

function openModal(name, desc, price, vol, ing, allerg, brand) {
  const body = document.getElementById('modalBody');
  let brandHtml = brand && brands[brand] ? `<a href="${brands[brand]}" target="_blank" class="brand-link">🔗 Сайт бренда</a>` : '';
  let allergHtml = allerg ? `<div style="margin-top:0.5rem;color:#ff6b6b">⚠️ Аллергены: ${allerg}</div>` : '';
  
  body.innerHTML = `<h2 class="modal-title">${name}</h2>
    <div style="color:var(--text-muted);margin-bottom:0.5rem">${vol} • ${price} ₽</div>
    <div style="margin-bottom:0.5rem">${desc}</div>
    <div class="modal-ing">${ing.split(', ').map(x=>`<span>${x}</span>`).join('')}</div>
    ${allergHtml}${brandHtml}`;
  document.getElementById('modal').classList.add('open');
}

function closeModal() {
  document.getElementById('modal').classList.remove('open');
}

function doSearch(q) {
  const res = document.getElementById('searchRes');
  if(!q) { res.innerHTML=''; return; }
  const low = q.toLowerCase();
  let html = '';
  Object.keys(menu).forEach(k => {
    if(!menu[k].items) return;
    menu[k].items.forEach(it => {
      if(it.n.toLowerCase().includes(low) || it.i.some(x=>x.toLowerCase().includes(low))) {
        html += `<div class="card" style="margin:0.5rem 0" onclick="switchTab('${k}');setTimeout(()=>openModal('${it.n}','${it.d||''}','${it.p}','${it.v||'50'}','${it.i.join(', ')}','','${it.br||''}'),100)">
          <strong style="color:var(--gold)">${it.n}</strong> <span style="color:var(--text-muted)">(${menu[k].title})</span></div>`;
      }
    });
  });
  res.innerHTML = html || '<p style="text-align:center;color:var(--text-muted)">Ничего не найдено</p>';
}

function checkQ(btn, correct) {
  if(btn.parentElement.dataset.done) return;
  btn.parentElement.dataset.done = '1';
  btn.style.background = correct ? 'var(--gold)' : '#800020';
  btn.style.color = correct ? '#000' : '#fff';
}

window.addEventListener('DOMContentLoaded', init);
</script>
</body>
</html>
