    :root {

      --gold-dark: #AA8C2C;
      --bg-deep: #0F0C08;
      --bg-card: #1A150E;
      --text-main: #E8E6E1;
      --text-muted: #A09B91;

    }
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body {

      background-color: var(--bg-deep);
      color: var(--text-main);

      min-height: 100vh;
      overflow-x: hidden;
    }
    body::before {
      content: '';
      position: fixed; top: 0; left: 0; right: 0; bottom: 0;
      border: 3px double var(--gold);
      pointer-events: none; z-index: 9999;
      margin: 8px; opacity: 0.6;
    }
    h1,h2,h3,h4 { font-family: 'Cormorant Garamond', serif; font-weight: 600; }
    
    /* HERO */
    .hero {
      min-height: 100vh;
      display: flex; flex-direction: column; justify-content: center; align-items: center; text-align: center;
      padding: 2rem; position: relative;
      background: linear-gradient(180deg, rgba(15,12,8,0.9) 0%, var(--bg-deep) 100%);
    }
    .hero-ornament { font-size: 2.5rem; color: var(--gold); margin-bottom: 1rem; opacity: 0.8; letter-spacing: 8px; }
    .hero h1 { font-size: clamp(2rem, 5vw, 3.5rem); color: var(--gold); text-transform: uppercase; letter-spacing: 3px; margin-bottom: 0.5rem; }
    .hero p { font-size: 1.1rem; color: var(--text-muted); margin-bottom: 2.5rem; font-style: italic; }
    .btn-gold {
      background: linear-gradient(45deg, var(--gold-dark), var(--gold));
      color: #000; font-family: 'Cormorant Garamond', serif; font-size: 1.3rem; font-weight: 700;
      padding: 0.9rem 2.5rem; border: 2px solid var(--gold-light); border-radius: 50px;
      cursor: pointer; transition: all 0.3s; text-transform: uppercase; letter-spacing: 2px;
      box-shadow: 0 0 15px rgba(212,175,55,0.3);
    }
    .btn-gold:hover { transform: scale(1.05); box-shadow: 0 0 25px rgba(212,175,55,0.6); background: var(--gold-light); }

    /* APP */
    #app { display: none; max-width: 1200px; margin: 0 auto; padding: 1rem 1rem 4rem; animation: fadeIn 0.8s ease; }
    @keyframes fadeIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }

    /* NAV */
    .nav-scroller {
      position: sticky; top: 10px; z-index: 100; margin-bottom: 1.5rem;
      background: rgba(15,12,8,0.95); backdrop-filter: blur(8px);
      padding: 0.5rem; border-radius: 50px; border: 1px solid rgba(212,175,55,0.4);
      display: flex; overflow-x: auto; gap: 0.4rem; scrollbar-width: none;
    }
    .nav-scroller::-webkit-scrollbar { display: none; }
    .nav-btn {
      background: transparent; border: 1px solid transparent; color: var(--text-muted);
      padding: 0.5rem 1rem; border-radius: 40px; font-family: 'Cormorant Garamond', serif;
      font-size: 1rem; font-weight: 600; cursor: pointer; white-space: nowrap; transition: 0.2s;
    }
    .nav-btn.active { background: var(--gold); color: #000; border-color: var(--gold-light); }

    /* CONTENT */
    .section { display: none; }
    .section.active { display: block; }
    .section-header { text-align: center; margin-bottom: 1.5rem; padding-bottom: 0.8rem; border-bottom: 1px solid rgba(212,175,55,0.3); }
    .section-header h2 { font-size: 2rem; color: var(--gold); }

    .grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(280px, 1fr)); gap: 1.2rem; }
    .card {
      background: var(--bg-card); border: 1px solid rgba(212,175,55,0.2); border-radius: 10px;
      padding: 1.2rem; position: relative; transition: transform 0.2s, border-color 0.2s; cursor: pointer;
    }
    .card:hover { transform: translateY(-4px); border-color: var(--gold); box-shadow: 0 8px 20px rgba(0,0,0,0.4); }
    .card::after {
      content: ''; position: absolute; top: 0; right: 0; width: 0; height: 0;
      border-style: solid; border-width: 0 35px 35px 0; border-color: transparent var(--gold) transparent transparent; opacity: 0.7;
    }
    .card-title { font-size: 1.3rem; color: var(--gold); margin-bottom: 0.4rem; padding-right: 30px; }
    .card-sub { font-size: 0.85rem; color: var(--text-muted); margin-bottom: 0.8rem; font-style: italic; }
    .card-tags { display: flex; flex-wrap: wrap; gap: 0.4rem; margin-bottom: 0.6rem; }
    .tag { background: rgba(212,175,55,0.1); color: var(--gold); padding: 0.15rem 0.5rem; border-radius: 4px; font-size: 0.7rem; border: 1px solid rgba(212,175,55,0.3); }
    .price { position: absolute; bottom: 1rem; right: 1rem; font-size: 1.1rem; font-weight: 700; color: var(--gold); font-family: 'Cormorant Garamond', serif; }

    /* SEARCH & INFO */
    .search-box {
      width: 100%; padding: 0.8rem 1.2rem; background: var(--bg-card); border: 1px solid rgba(212,175,55,0.3);
      border-radius: 50px; color: var(--text-main); font-size: 1rem; margin-bottom: 1.5rem;
    }
    .search-box:focus { outline: none; border-color: var(--gold); box-shadow: 0 0 0 2px rgba(212,175,55,0.2); }
    .info-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(300px, 1fr)); gap: 1.2rem; }
    .info-card { background: var(--bg-card); border: 1px solid rgba(212,175,55,0.2); border-radius: 10px; padding: 1.2rem; }
    .info-card h3 { color: var(--gold); margin-bottom: 0.5rem; }
    .info-card p { color: var(--text-muted); line-height: 1.5; font-size: 0.9rem; }

    /* GAME */
    .game-wrap { background: var(--bg-card); border: 2px solid rgba(212,175,55,0.4); border-radius: 15px; padding: 1.5rem; text-align: center; }
    .game-ui { display: flex; justify-content: space-between; margin-bottom: 1rem; font-family: 'Cormorant Garamond', serif; }
    .game-stat { font-size: 1.2rem; color: var(--gold); }
    .game-area {
      height: 400px; background: #111; border: 1px dashed rgba(212,175,55,0.3); border-radius: 10px;
      position: relative; overflow: hidden; touch-action: none; margin-bottom: 1rem;
    }
    .basket {
      position: absolute; bottom: 15px; left: 50%; width: 70px; height: 15px;
      background: linear-gradient(90deg, var(--gold-dark), var(--gold)); border-radius: 8px;
      transform: translateX(-50%); transition: left 0.05s linear; pointer-events: none;
    }
    .basket::before { content: ''; position: absolute; top: -28px; left: 50%; transform: translateX(-50%); font-size: 2rem; }
    .falling { position: absolute; font-size: 1.8rem; pointer-events: none; transition: transform 0.1s; }
    .game-overlay {
      position: absolute; top: 0; left: 0; right: 0; bottom: 0; background: rgba(0,0,0,0.85);
      display: none; flex-direction: column; justify-content: center; align-items: center; z-index: 10;
    }
    .game-overlay.open { display: flex; }
    .game-overlay h3 { color: var(--gold); font-size: 2rem; margin-bottom: 0.5rem; }
    .game-overlay p { color: var(--text-muted); margin-bottom: 1rem; }

    /* QUIZ */
    .quiz-q { background: var(--bg-card); border: 1px solid rgba(212,175,55,0.2); border-radius: 10px; padding: 1.2rem; margin-bottom: 1rem; }
    .quiz-q h4 { color: var(--gold); margin-bottom: 0.8rem; font-size: 1.1rem; }
    .quiz-opt { display: block; width: 100%; padding: 0.8rem; margin: 0.4rem 0; background: transparent; border: 1px solid rgba(212,175,55,0.3); color: var(--text-main); border-radius: 6px; cursor: pointer; text-align: left; font-family: 'Montserrat', sans-serif; transition: 0.2s; }
    .quiz-opt:hover { background: rgba(212,175,55,0.1); }
    .quiz-opt.correct { background: rgba(76,175,80,0.2); border-color: #4caf50; color: #81c784; }
    .quiz-opt.wrong { background: rgba(244,67,54,0.2); border-color: #f44336; color: #e57373; }

    /* MODAL */
    .modal-back { position: fixed; top: 0; left: 0; right: 0; bottom: 0; background: rgba(0,0,0,0.9); z-index: 2000; display: none; justify-content: center; align-items: center; padding: 1rem; }
    .modal-back.open { display: flex; }
    .modal-box { background: var(--bg-card); border: 2px solid var(--gold); border-radius: 12px; padding: 1.5rem; max-width: 600px; width: 100%; max-height: 90vh; overflow-y: auto; position: relative; }
    .modal-close { position: absolute; top: 10px; right: 12px; font-size: 1.8rem; color: var(--gold); cursor: pointer; background: none; border: none; }
    .modal-title { font-size: 1.6rem; color: var(--gold); margin-bottom: 0.5rem; }
    .modal-meta { display: flex; gap: 1rem; margin-bottom: 1rem; font-size: 0.9rem; color: var(--text-muted); }
    .modal-ing { display: flex; flex-wrap: wrap; gap: 0.5rem; margin: 0.8rem 0; }
    .modal-ing span { background: rgba(212,175,55,0.1); color: var(--gold); padding: 0.3rem 0.6rem; border-radius: 20px; font-size: 0.8rem; border: 1px solid rgba(212,175,55,0.3); }
    .brand-link { display: inline-flex; align-items: center; gap: 0.5rem; margin-top: 1rem; padding: 0.5rem 1rem; background: rgba(212,175,55,0.1); border: 1px solid var(--gold); border-radius: 8px; color: var(--gold); text-decoration: none; font-size: 0.9rem; transition: 0.2s; }
    .brand-link:hover { background: rgba(212,175,55,0.2); }

    @media (max-width: 600px) {
      .hero h1 { font-size: 2rem; }
      .grid { grid-template-columns: 1fr; }
      .game-area { height: 300px; }
    }
  </style>
</head>

function init() {
  $('#startBtn').onclick = () => { $('#hero').style.display='none'; $('#app').style.display='block'; render(); };

}

function switchTab(id) {
  current = id;
  render();
  window.scrollTo({top:0,behavior:'smooth'});
}

function openModal(it, cat) {
  const body = $('#modalBody');
  let brandHtml = '';
  if(it.br && brands[it.br]) brandHtml = `<a href="${brands[it.br]}" target="_blank" class="brand-link">🔗 Официальный сайт бренда</a>`;
  
  body.innerHTML = `<h2 class="modal-title">${it.n}</h2>
    <div class="modal-meta">${it.v?`<span>📏 ${it.v}</span>`:''} <span>💰 ${it.p} ₽</span></div>
    <div style="color:var(--text-muted);margin-bottom:1rem;line-height:1.5;">${it.d||it.s||''}</div>
    <div class="modal-ing">${it.i.map(x=>`<span>${x}</span>`).join('')}</div>
    ${it.srv?`<div style="margin-top:0.8rem;color:var(--text-muted);font-size:0.9rem;">🍽️ Подача: ${it.srv}</div>`:''}
    ${brandHtml}`;
  $('#modal').classList.add('open');
}

function doSearch(q) {
  const res = $('#searchRes');
  if(!q) { res.innerHTML=''; return; }
  const low = q.toLowerCase();
  const found = [];
  Object.keys(menu).forEach(k => {
    if(!menu[k].items) return;
    menu[k].items.forEach(it => {
      if(it.n.toLowerCase().includes(low) || it.i.some(x=>x.toLowerCase().includes(low))) {
        found.push({...it, cat:k, catTitle:menu[k].title});
      }
    });
  });
  res.innerHTML = found.length ? found.map(it => `
    <div class="card" onclick="switchTab('${it.cat}'); setTimeout(()=>openModal(${JSON.stringify(it).replace(/"/g,'&quot;')}, '${it.cat}'), 100)">
      <h3 class="card-title">${it.n}</h3>
      <p class="card-sub">${it.catTitle}</p>
      <div class="card-tags">${it.i.slice(0,3).map(x=>`<span class="tag">${x}</span>`).join('')}...</div>
    </div>`).join('') : '<p style="grid-column:1/-1;text-align:center;color:var(--text-muted);">Ничего не найдено</p>';
}

function renderQuiz() {
  const wrap = $('#quizWrap');
  wrap.innerHTML = menu.quiz.q.map((q,i) => `
    <div class="quiz-q" id="qq${i}">
      <h4>${i+1}. ${q.q}</h4>
      <div class="opts">${q.o.map((opt,j) => `<button class="quiz-opt" onclick="checkQ(${i},${j},${q.c})">${opt}</button>`).join('')}</div>
      <div class="exp" style="display:none;margin-top:0.5rem;padding:0.5rem;background:rgba(212,175,55,0.1);border-radius:6px;color:var(--text-muted);font-size:0.9rem;">💡 ${q.e}</div>
    </div>`).join('');
}

function checkQ(idx, pick, correct) {
  const qEl = $(`#qq${idx}`);
  if(qEl.dataset.done) return;
  qEl.dataset.done = '1';
  qEl.querySelectorAll('.quiz-opt').forEach((b,j) => {
    b.style.pointerEvents = 'none';
    if(j===correct) b.classList.add('correct');
    else if(j===pick) b.classList.add('wrong');
  });
  qEl.querySelector('.exp').style.display = 'block';
}

function initGame() {
  const area = $('#gArea');
  if(!area) return;
  g.areaW = area.offsetWidth; g.areaH = area.offsetHeight;
  area.onmousemove = e => { if(!g.active) return; g.mouseX = e.clientX - area.getBoundingClientRect().left; };
  area.ontouchmove = e => { if(!g.active) return; e.preventDefault(); g.mouseX = e.touches[0].clientX - area.getBoundingClientRect().left; }, {passive:false};
  $('#gStart').onclick = startGame;
}

function startGame() {
  g = {active:true, round:1, lives:3, prog:0, items:[], speed:1.8, spawn:0.04, loop:null, basketX: g.areaW/2, areaW:g.areaW, areaH:g.areaH, mouseX:g.areaW/2};
  $('#gOverlay').classList.remove('open');
  updateG(); startRound();
  g.loop = requestAnimationFrame(loopG);
}

function startRound() {
  if(g.round > 20) { endG(true); return; }
  g.lives = 3; g.prog = 0;
  g.items.forEach(i => i.el.remove()); g.items = [];
  g.speed = 1.8 + (g.round * 0.15); g.spawn = 0.04 + (g.round * 0.005);
  updateG();
  const ord = orders[g.round-1];
  $('#gArea').querySelector('.game-ui').insertAdjacentHTML('beforebegin', `<div style="position:absolute;top:10px;left:50%;transform:translateX(-50%);background:rgba(0,0,0,0.7);padding:0.4rem 1rem;border-radius:20px;color:var(--gold);font-size:0.9rem;z-index:5;">📜 ${ord.n}</div>`);
}

function spawn() {
  if(Math.random() > g.spawn) return;
  const ord = orders[g.round-1];
  const isC = Math.random() < 0.3;
  let em = isC ? ord.c[Math.floor(Math.random()*ord.c.length)] : wrongs[Math.floor(Math.random()*wrongs.length)];
  if(!em) em = '';
  const el = document.createElement('div'); el.className='falling'; el.textContent=em; el.dataset.c=isC;
  const x = Math.random()*(g.areaW-40);
  el.style.left = x+'px'; el.style.top='-50px';
  $('#gArea').appendChild(el);
  g.items.push({el, y:-50, x, speed: g.speed + (Math.random()*0.6-0.3)});
}

function loopG() {
  if(!g.active) return;
  spawn();
  if(g.mouseX !== null) {
    g.basketX = Math.max(0, Math.min(g.mouseX - 35, g.areaW - 70));
    $('#gBasket').style.left = g.basketX + 'px';
  }
  const bx = g.basketX, by = g.areaH - 30, bw = 70, bh = 15;
  for(let i=g.items.length-1; i>=0; i--) {
    const it = g.items[i];
    it.y += it.speed; it.el.style.top = it.y+'px';
    if(it.y+30 >= by && it.y <= by+bh && it.x+30 >= bx && it.x <= bx+bw) {
      if(it.el.dataset.c==='true') {
        g.prog++; updateG();
        if(g.prog>=3) setTimeout(()=>{g.round++;startRound();},300);
      } else {
        g.lives--; updateG();
        if(g.lives<=0) setTimeout(()=>endG(false),300);
      }
      it.el.remove(); g.items.splice(i,1); continue;
    }
    if(it.y > g.areaH) { it.el.remove(); g.items.splice(i,1); }
  }
  g.loop = requestAnimationFrame(loopG);
}

function updateG() {
  $('#gRound').textContent = g.round+'/20';
  $('#gLives').textContent = '❤️'.repeat(g.lives)+'🖤'.repeat(3-g.lives);
  $('#gProg').textContent = g.prog+'/3';
}

function endG(win) {
  g.active = false; cancelAnimationFrame(g.loop);
  g.items.forEach(i=>i.el.remove()); g.items=[];
  const ov = $('#gOverlay'); ov.classList.add('open');
  ov.querySelector('h3').textContent = win ? '✅ Смена окончена!' : ' Гость отравился!';
  ov.querySelector('p').textContent = win ? 'Все 20 заказов выполнены идеально!' : `Ошибка в раунде ${g.round}. Попробуйте снова.`;
  ov.querySelector('button').textContent = 'Играть снова';
}

// ================= INIT =================
window.addEventListener('DOMContentLoaded', init);
</script>
</body>
</html>
