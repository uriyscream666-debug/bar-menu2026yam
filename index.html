<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Барная карта 2026 | Этно</title>
  <!-- Шрифты для этно-стиля -->
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,400;0,600;0,700;1,400&family=Montserrat:wght@300;400;500&display=swap" rel="stylesheet">
  
  <style>
    :root {
      --gold: #D4AF37;
      --gold-light: #F2E2A4;
      --gold-dark: #AA8C2C;
      --bg-deep: #0F0C08; /* Тёмное дерево/уголь */
      --bg-card: #1A150E;
      --text-main: #E8E6E1;
      --text-muted: #A09B91;
      --accent-red: #800020; /* Бургунди для акцентов */
      --border-ornament: 2px solid var(--gold);
    }

    * { box-sizing: border-box; margin: 0; padding: 0; }
    
    body {
      font-family: 'Montserrat', sans-serif;
      background-color: var(--bg-deep);
      color: var(--text-main);
      /* Этно-фон: геометрический узор через CSS */
      background-image: 
        radial-gradient(circle at 50% 50%, #1A150E 20%, transparent 21%),
        radial-gradient(circle at 0% 0%, #1A150E 20%, transparent 21%),
        radial-gradient(circle at 100% 0%, #1A150E 20%, transparent 21%),
        radial-gradient(circle at 100% 100%, #1A150E 20%, transparent 21%),
        radial-gradient(circle at 0% 100%, #1A150E 20%, transparent 21%);
      background-size: 40px 40px;
      min-height: 100vh;
      overflow-x: hidden;
    }

    /* Декоративная рамка по краям экрана */
    body::before {
      content: '';
      position: fixed;
      top: 0; left: 0; right: 0; bottom: 0;
      border: 4px double var(--gold);
      pointer-events: none;
      z-index: 1000;
      margin: 10px;
    }

    h1, h2, h3, h4 { font-family: 'Cormorant Garamond', serif; }

    /* --- HERO SECTION --- */
    .hero {
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      justify-content: center;
      align-items: center;
      text-align: center;
      padding: 2rem;
      background: linear-gradient(180deg, rgba(15,12,8,0) 0%, var(--bg-deep) 100%);
      position: relative;
    }

    .hero-ornament {
      font-size: 3rem;
      color: var(--gold);
      margin-bottom: 1rem;
      opacity: 0.8;
    }

    .hero h1 {
      font-size: clamp(2.5rem, 6vw, 4.5rem);
      color: var(--gold);
      text-transform: uppercase;
      letter-spacing: 4px;
      margin-bottom: 0.5rem;
      text-shadow: 0 4px 10px rgba(0,0,0,0.5);
    }

    .hero p {
      font-size: 1.2rem;
      color: var(--text-muted);
      margin-bottom: 3rem;
      font-style: italic;
      font-family: 'Cormorant Garamond', serif;
    }

    /* Кнопка */
    .btn-gold {
      background: linear-gradient(45deg, var(--gold-dark), var(--gold), var(--gold-dark));
      color: #000;
      font-family: 'Cormorant Garamond', serif;
      font-size: 1.5rem;
      font-weight: 700;
      padding: 1rem 3rem;
      border: 2px solid var(--gold-light);
      border-radius: 50px;
      cursor: pointer;
      transition: all 0.3s ease;
      text-transform: uppercase;
      letter-spacing: 2px;
      box-shadow: 0 0 15px rgba(212, 175, 55, 0.3);
      position: relative;
      overflow: hidden;
    }

    .btn-gold:hover {
      transform: scale(1.05);
      box-shadow: 0 0 25px rgba(212, 175, 55, 0.6);
      background: var(--gold-light);
    }

    /* --- CONTENT --- */
    .main-content {
      display: none; /* Скрыто до нажатия */
      max-width: 1200px;
      margin: 0 auto;
      padding: 2rem 1rem 5rem;
      animation: fadeIn 1s ease;
    }

    @keyframes fadeIn {
      from { opacity: 0; transform: translateY(20px); }
      to { opacity: 1; transform: translateY(0); }
    }

    /* Навигация (Табы) */
    .nav-scroller {
      position: sticky;
      top: 20px;
      z-index: 100;
      margin-bottom: 2rem;
      background: rgba(15, 12, 8, 0.9);
      backdrop-filter: blur(10px);
      padding: 0.5rem;
      border-radius: 50px;
      border: 1px solid var(--gold);
      display: flex;
      overflow-x: auto;
      gap: 0.5rem;
      scrollbar-width: none; /* Скрыть скроллбар */
    }
    .nav-scroller::-webkit-scrollbar { display: none; }

    .nav-btn {
      background: transparent;
      border: 1px solid transparent;
      color: var(--text-muted);
      padding: 0.6rem 1.2rem;
      border-radius: 40px;
      font-family: 'Cormorant Garamond', serif;
      font-size: 1.1rem;
      font-weight: 600;
      cursor: pointer;
      white-space: nowrap;
      transition: 0.3s;
    }
    .nav-btn.active {
      background: var(--gold);
      color: #000;
      border-color: var(--gold-light);
    }

    /* Карточки меню */
    .grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(300px, 1fr));
      gap: 1.5rem;
    }

    .card {
      background: var(--bg-card);
      border: 1px solid #33281F;
      border-radius: 12px;
      padding: 1.5rem;
      position: relative;
      transition: transform 0.3s, border-color 0.3s;
      overflow: hidden;
    }

    /* Золотой уголок для этно-эффекта */
    .card::after {
      content: '';
      position: absolute;
      top: 0; right: 0;
      width: 0; height: 0;
      border-style: solid;
      border-width: 0 40px 40px 0;
      border-color: transparent var(--gold) transparent transparent;
      opacity: 0.8;
    }

    .card:hover {
      transform: translateY(-5px);
      border-color: var(--gold);
      box-shadow: 0 10px 30px rgba(0,0,0,0.5);
    }

    .card-title {
      font-size: 1.4rem;
      color: var(--gold);
      margin-bottom: 0.5rem;
      padding-right: 30px; /* Место под уголок */
    }

    .card-subtitle {
      font-size: 0.9rem;
      color: var(--text-muted);
      margin-bottom: 1rem;
      font-style: italic;
    }

    .card-details {
      font-size: 0.9rem;
      line-height: 1.6;
      color: var(--text-main);
      margin-bottom: 1rem;
    }

    .card-tag {
      display: inline-block;
      background: rgba(212, 175, 55, 0.1);
      color: var(--gold);
      padding: 0.2rem 0.6rem;
      border-radius: 4px;
      font-size: 0.75rem;
      margin-right: 0.5rem;
      margin-bottom: 0.5rem;
      border: 1px solid rgba(212, 175, 55, 0.3);
    }

    .price-tag {
      position: absolute;
      bottom: 1rem; right: 1rem;
      font-size: 1.2rem;
      font-weight: 700;
      color: var(--gold);
      font-family: 'Cormorant Garamond', serif;
    }

    /* Секции */
    .section { display: none; }
    .section.active { display: block; }
    .section-header {
      text-align: center;
      margin-bottom: 2rem;
      padding-bottom: 1rem;
      border-bottom: 1px solid var(--gold);
    }
    .section-header h2 {
      font-size: 2.5rem;
      color: var(--gold);
    }

    /* Игра и Тест */
    .game-container {
      background: var(--bg-card);
      border: 2px solid var(--gold);
      border-radius: 20px;
      padding: 2rem;
      text-align: center;
    }
    
    .quiz-option {
      display: block;
      width: 100%;
      padding: 1rem;
      margin: 0.5rem 0;
      background: transparent;
      border: 1px solid var(--gold-dark);
      color: var(--text-main);
      border-radius: 8px;
      cursor: pointer;
      font-family: 'Montserrat', sans-serif;
      transition: 0.2s;
    }
    .quiz-option:hover {
      background: rgba(212, 175, 55, 0.1);
    }

    /* Модальное окно (инфо) */
    .modal-overlay {
      position: fixed;
      top: 0; left: 0; right: 0; bottom: 0;
      background: rgba(0,0,0,0.85);
      z-index: 2000;
      display: none;
      justify-content: center;
      align-items: center;
      padding: 1rem;
    }
    .modal-overlay.open { display: flex; }
    
    .modal-box {
      background: var(--bg-card);
      border: 2px solid var(--gold);
      border-radius: 15px;
      padding: 2rem;
      max-width: 600px;
      width: 100%;
      max-height: 90vh;
      overflow-y: auto;
      position: relative;
    }
    
    .modal-close {
      position: absolute;
      top: 10px; right: 15px;
      font-size: 2rem;
      color: var(--gold);
      cursor: pointer;
      background: none; border: none;
    }

    /* Адаптив */
    @media (max-width: 600px) {
      .hero h1 { font-size: 2.2rem; }
      .btn-gold { padding: 0.8rem 2rem; font-size: 1.2rem; }
      .grid { grid-template-columns: 1fr; }
    }
  </style>
</head>
<body>

  <!-- HERO -->
  <section class="hero" id="hero">
    <div class="hero-ornament">✦  ✦</div>
    <h1>Барная Карта 2026</h1>
    <p>Трактир • Шахерезада</p>
    <button class="btn-gold" id="startBtn">Открыть Меню</button>
  </section>

  <!-- MAIN APP -->
  <div class="main-content" id="app">
    
    <!-- NAVIGATION -->
    <nav class="nav-scroller">
      <button class="nav-btn active" onclick="switchTab('water')">Вода</button>
      <button class="nav-btn" onclick="switchTab('non-alc')">Безалко</button>
      <button class="nav-btn" onclick="switchTab('lemonades')">Лимонады</button>
      <button class="nav-btn" onclick="switchTab('coffee')">Кофе/Чай</button>
      <button class="nav-btn" onclick="switchTab('cocktails')">Коктейли</button>
      <button class="nav-btn" onclick="switchTab('tinctures')">Настойки</button>
      <button class="nav-btn" onclick="switchTab('strong')">Крепкое</button>
      <button class="nav-btn" onclick="switchTab('game')">Игра</button>
      <button class="nav-btn" onclick="switchTab('quiz')">Тест</button>
    </nav>

    <!-- SECTIONS -->
    <div id="contentArea">
      <!-- Контент будет генерироваться JS -->
    </div>

  </div>

  <!-- MODAL -->
  <div class="modal-overlay" id="modal" onclick="if(event.target===this) closeModal()">
    <div class="modal-box">
      <button class="modal-close" onclick="closeModal()">&times;</button>
      <div id="modalBody"></div>
    </div>
  </div>

  <script>
    // === ДАННЫЕ МЕНЮ (Сокращенная версия для примера, можно расширить) ===
    // Я вставил ключевые данные из вашего файла
    const menuData = {
      'water': {
        title: 'Минеральная вода',
        items: [
          { name: 'Байкал', vol: '530 мл', price: '390₽', desc: 'Мягкая столовая вода.', ing: ['Газ/Негаз'] },
          { name: 'Недра', vol: '750 мл', price: '610₽', desc: 'Премиальная из Новгородской обл.', ing: ['Газ/Негаз'] },
          { name: 'Боржоми', vol: '500 мл', price: '450₽', desc: 'Легендарная грузинская вода.', ing: ['Стекло'] }
        ]
      },
      'non-alc': {
        title: 'Безалкогольные напитки',
        items: [
          { name: 'Квас домашний', vol: '250 мл', price: '350₽', desc: 'Живой, нефильтрованный, с хлебным духом.', ing: ['Сусло', 'Дрожжи'] },
          { name: 'Медовуха', vol: '250 мл', price: '400₽', desc: 'Старинный напиток на мёду.', ing: ['Мёд', 'Дрожжи'] },
          { name: 'Морс', vol: '250 мл', price: '300₽', desc: 'Домашний из настоящих ягод.', ing: ['Смородина', 'Клюква'] }
        ]
      },
      'lemonades': {
        title: 'Домашние лимонады',
        items: [
          { name: 'Райхон', vol: '300 мл', price: '460₽', desc: 'С ароматом свежего базилика.', ing: ['Базилик', 'Лимон'] },
          { name: 'Манго Маракуйя', vol: '300 мл', price: '460₽', desc: 'Тропический взрыв – хит!', ing: ['Кокос', 'Манго'] },
          { name: 'Тархун', vol: '300 мл', price: '460₽', desc: 'Натуральный эстрагон.', ing: ['Тархун', 'Лайм'] }
        ]
      },
      'coffee': {
        title: 'Кофе и Чай',
        items: [
          { name: 'Саган-Дайля', vol: '800 мл', price: '600₽', desc: 'Шаманский чай из Бурятии. Бодрит сильнее кофе!', ing: ['Рододендрон'] },
          { name: 'Молочный Улун', vol: '800 мл', price: '560₽', desc: 'Зелёный улун с натуральным сливочным вкусом.', ing: ['Улун'] },
          { name: 'Капучино', vol: '200 мл', price: '390₽', desc: 'Есть альт. молоко: кокос, миндаль.', ing: ['Молоко', 'Эспрессо'] }
        ]
      },
      'cocktails': {
        title: 'Коктейли',
        items: [
          { name: 'Берёзовый виски коллинз', vol: '', price: '850₽', desc: 'На берёзовом соке – наша гордость.', ing: ['Бурбон', 'Берёзовый сироп'] },
          { name: 'Лавандовый джин-тоник', vol: '', price: '850₽', desc: 'Самый фотогеничный в меню.', ing: ['Джин', 'Лаванда'] },
          { name: 'Негрони', vol: '', price: '850₽', desc: 'Для ценителей горького баланса.', ing: ['Джин', 'Кампари', 'Вермут'] },
          { name: 'Дайкири Банан', vol: '', price: '850₽', desc: 'Шоу с огнём у стола.', ing: ['Ром', 'Банан'] }
        ]
      },
      'tinctures': {
        title: 'Авторские настойки',
        items: [
          { name: 'Сливянка', vol: '50 мл', price: '500₽', desc: 'На тёмном роме, со сливой и кизилом.', ing: ['Ром', 'Слива'] },
          { name: 'Хреновуха', vol: '50 мл', price: '500₽', desc: 'Острая, с хреном и горчицей.', ing: ['Водка', 'Хрен'] },
          { name: 'Клубничная', vol: '50 мл', price: '500₽', desc: 'Сладкая, на белом роме.', ing: ['Ром', 'Клубника'] }
        ]
      },
      'strong': {
        title: 'Крепкий алкоголь',
        items: [
          { name: 'Ники Пьюр', vol: '50 мл', price: '610₽', desc: 'Солодовый спирт Альфа, очень мягкая.', ing: ['Водка'] },
          { name: 'Hendrick\'s', vol: '50 мл', price: '900₽', desc: 'С нотками огурца и розы.', ing: ['Джин'] },
          { name: 'Glen Moray 12', vol: '50 мл', price: '1200₽', desc: 'Спейсайд, цветочно-фруктовый.', ing: ['Виски'] }
        ]
      }
    };

    // === КВИЗ ===
    const quizData = [
      { q: "Что такое Саган-Дайля?", a: ["Шаманский чай, бодрит сильнее кофе", "Сорт рома", "Вид пива"], correct: 0 },
      { q: "На каком спирте водка Ники Пьюр?", a: ["Люкс", "Альфа (солодовый)", "Высшей очистки"], correct: 1 },
      { q: "Что нужно сказать про квас?", a: ["Это газировка", "Живой, нефильтрованный, с хлебным духом", "Сладкий сироп"], correct: 1 },
      { q: "Какой коктейль поджигают у стола?", a: ["Негрони", "Дайкири Банан", "Мохито"], correct: 1 }
    ];

    let currentTab = 'water';

    // === ИНИЦИАЛИЗАЦИЯ ===
    document.addEventListener('DOMContentLoaded', () => {
      const btn = document.getElementById('startBtn');
      const hero = document.getElementById('hero');
      const app = document.getElementById('app');

      // Кнопка работает!
      btn.onclick = () => {
        hero.style.display = 'none';
        app.style.display = 'block';
        renderTab(currentTab);
        window.scrollTo(0, 0);
      };
    });

    // === ФУНКЦИИ ===
    function switchTab(tab) {
      currentTab = tab;
      // Обновляем кнопки
      document.querySelectorAll('.nav-btn').forEach(b => b.classList.remove('active'));
      event.target.classList.add('active'); // event доступен благодаря inline onclick
      renderTab(tab);
    }

    function renderTab(tab) {
      const container = document.getElementById('contentArea');
      
      if (tab === 'game') {
        container.innerHTML = `
          <div class="section active">
            <div class="game-container">
              <h2 style="color:var(--gold); margin-bottom:1rem;">🎮 Барная Игра</h2>
              <p>Собирай правильные ингредиенты в корзину!</p>
              <div style="height:300px; background:#111; margin:2rem 0; border:1px dashed var(--gold); display:flex; align-items:center; justify-content:center; color:#555;">
                [Здесь будет Canvas игры]
              </div>
              <button class="btn-gold" style="font-size:1rem; padding:0.5rem 1.5rem;">Начать игру</button>
            </div>
          </div>`;
        return;
      }

      if (tab === 'quiz') {
        let html = `<div class="section active"><div class="section-header"><h2>📜 Тест знаний</h2></div>`;
        quizData.forEach((item, i) => {
          html += `
            <div class="card" style="margin-bottom:1rem;">
              <h3 style="margin-bottom:1rem; color:var(--text-main);">${i + 1}. ${item.q}</h3>
              <div id="quiz-${i}">
                ${item.a.map((ans, j) => `
                  <button class="quiz-option" onclick="checkAnswer(this, ${j === item.correct})">${ans}</button>
                `).join('')}
              </div>
            </div>`;
        });
        html += `</div>`;
        container.innerHTML = html;
        return;
      }

      // Рендер обычного меню
      const data = menuData[tab];
      if (!data) return;

      let html = `
        <div class="section active">
          <div class="section-header">
            <h2>${data.title}</h2>
          </div>
          <div class="grid">
      `;

      data.items.forEach(item => {
        html += `
          <div class="card" onclick="openModal('${item.name}', '${item.desc}', '${item.price}', '${item.vol}', '${item.ing.join(', ')}')">
            <h3 class="card-title">${item.name}</h3>
            <p class="card-subtitle">${item.desc}</p>
            <div class="card-tag">${item.vol || '50 мл'}</div>
            <div class="price-tag">${item.price}</div>
          </div>
        `;
      });

      html += `</div></div>`;
      container.innerHTML = html;
    }

    // === МОДАЛКА ===
    function openModal(name, desc, price, vol, ing) {
      const modal = document.getElementById('modal');
      const body = document.getElementById('modalBody');
      
      body.innerHTML = `
        <h2 style="color:var(--gold); margin-bottom:0.5rem;">${name}</h2>
        <div style="font-size:1.5rem; color:var(--text-main); margin-bottom:1rem; font-family:'Cormorant Garamond'">${price}</div>
        <p style="margin-bottom:1rem; color:var(--text-muted); line-height:1.6;">${desc}</p>
        <div style="background:#221a10; padding:1rem; border-radius:8px;">
          <strong style="color:var(--gold); display:block; margin-bottom:0.5rem;">Состав:</strong>
          <span style="color:var(--text-main);">${ing}</span>
        </div>
        <div style="margin-top:1rem; font-size:0.8rem; color:#666;">Объём подачи: ${vol}</div>
      `;
      
      modal.classList.add('open');
    }

    function closeModal() {
      document.getElementById('modal').classList.remove('open');
    }

    function checkAnswer(btn, isCorrect) {
      const parent = btn.parentElement;
      const allBtns = parent.querySelectorAll('.quiz-option');
      allBtns.forEach(b => b.style.pointerEvents = 'none'); // Блокируем повторные клики

      if (isCorrect) {
        btn.style.background = 'var(--gold)';
        btn.style.color = '#000';
        btn.innerText += ' ✅';
      } else {
        btn.style.borderColor = 'var(--accent-red)';
        btn.style.color = 'var(--accent-red)';
        btn.innerText += ' ';
      }
    }
  </script>
</body>
</html>
